<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Club Selector</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #c8cec8;
            min-height: 100vh;
        }
        #auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .auth-logo img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 16px;
        }
        .auth-logo h1 {
            font-size: 24px;
            color: #1a5c28;
            font-weight: 700;
        }
        .auth-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f0f0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .auth-tab.active {
            background: #1a5c28;
            color: white;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: #333;
        }
        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #1a5c28;
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: #1a5c28;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            text-transform: uppercase;
        }
        .btn-primary:hover {
            background: #0e3518;
        }
        .auth-msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .auth-msg.error {
            display: block;
            background: #fee;
            color: #c00;
        }
        .auth-msg.success {
            display: block;
            background: #efe;
            color: #060;
        }
        #app-screen {
            display: none;
            flex-direction: column;
            min-height: 100vh;
        }
        .topbar {
            background: linear-gradient(135deg, #1a5c28, #0e3518);
            color: white;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }
        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .topbar-brand img {
            width: 44px;
            height: 44px;
            border-radius: 10px;
        }
        .topbar-title {
            font-size: 20px;
            font-weight: 700;
        }
        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .user-email {
            font-size: 13px;
            opacity: 0.9;
        }
        .unit-toggle {
            display: flex;
            gap: 4px;
        }
        .unit-btn {
            padding: 8px 14px;
            border: 1px solid rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .unit-btn.active {
            background: white;
            color: #1a5c28;
        }
        .btn-sm {
            padding: 8px 16px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-sm:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-delete {
            background: #d32f2f !important;
            border-color: #d32f2f !important;
        }
        .main-content {
            flex: 1;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }
        .legend {
            background: white;
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-box {
            width: 24px;
            height: 16px;
            border-radius: 4px;
        }
        table {
            width: 100%;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        thead {
            background: #f5f5f5;
        }
        th {
            padding: 12px 10px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #666;
        }
        td {
            padding: 12px 10px;
            border-top: 1px solid #eee;
            font-size: 14px;
        }
        select, input[type="number"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 100%;
        }
        .disp-container {
            position: relative;
            height: 36px;
            display: flex;
            align-items: center;
        }
        .disp-bar {
            position: relative;
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .disp-max-l, .disp-max-r, .disp-avg-l, .disp-avg-r {
            position: absolute;
            height: 100%;
        }
        .disp-max-l, .disp-max-r { opacity: 0.3; }
        .disp-avg-l, .disp-avg-r { opacity: 0.7; }
        .disp-label {
            position: relative;
            z-index: 2;
            font-size: 11px;
            font-weight: 700;
            background: white;
            padding: 4px 10px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .overview {
            background: white;
            border-radius: 10px;
            padding: 24px;
            margin-top: 24px;
        }
        .overview h2 {
            margin-bottom: 20px;
            font-size: 20px;
            color: #1a5c28;
        }
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a5c28;
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.3);
            display: none;
            z-index: 1000;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="icon.png" alt="Club Selector">
                <h1>CLUB SELECTOR</h1>
            </div>
            <div class="auth-tabs">
                <button class="auth-tab active" id="btn-login" onclick="switchTab('login')">LOGIN</button>
                <button class="auth-tab" id="btn-signup" onclick="switchTab('signup')">SIGN UP</button>
            </div>
            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>EMAIL</label>
                    <input type="email" id="auth-email" class="form-input" placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="auth-password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary" id="auth-submit">LOGIN</button>
                <div id="auth-msg" class="auth-msg"></div>
            </form>
        </div>
    </div>

    <div id="app-screen">
        <div class="topbar">
            <div class="topbar-brand">
                <img src="icon.png" alt="Icon">
                <span class="topbar-title">CLUB SELECTOR</span>
            </div>
            <div class="topbar-actions">
                <span class="user-email" id="user-email-display"></span>
                <div class="unit-toggle">
                    <button class="unit-btn active" id="btn-m" onclick="setUnit('m')">M</button>
                    <button class="unit-btn" id="btn-yds" onclick="setUnit('yds')">YDS</button>
                </div>
                <button class="btn-sm" onclick="saveData()">Save</button>
                <button class="btn-sm" onclick="signOut()">Logout</button>
                <button class="btn-sm btn-delete" onclick="deleteAccount()">Delete Account</button>
            </div>
        </div>

        <div class="main-content">
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-box" style="background:#90EE90;opacity:0.3"></div>
                    <span>Max Dispersion</span>
                </div>
                <div class="legend-item">
                    <div class="legend-box" style="background:#228B22;opacity:0.7"></div>
                    <span>Avg Dispersion</span>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>CLUB / LOFT</th>
                        <th>LEN</th>
                        <th>MAX</th>
                        <th>L</th>
                        <th>R</th>
                        <th>DISPERSION ← · →</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>

            <div class="overview">
                <h2>Dispersion Overview</h2>
                <div id="overview-graph"></div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const {createClient} = supabase;
        const SUPABASE_URL = 'https://pgbaugeomvkoofjghsds.supabase.co';
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnYmF1Z2VvbXZrb29mamdoc2RzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzExNzA0NzIsImV4cCI6MjA4Njc0NjQ3Mn0.MrwAXZXx8MMTO0rJ9V3sQdi_uzDesyrMA9JhFDgP4SE';
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

        let currentUser = null;
        let authMode = 'login';
        let unit = 'm';
        let clubData = [];

        const CLUBS = [
            {club:'DRIVER',loft:''},{club:'3W',loft:''},{club:'5W',loft:''},{club:'7W',loft:''},
            {club:'3H',loft:''},{club:'4H',loft:''},{club:'5H',loft:''},
            {club:'4I',loft:''},{club:'5I',loft:''},{club:'6I',loft:''},{club:'7I',loft:''},
            {club:'8I',loft:''},{club:'9I',loft:''},{club:'PW',loft:''},
            {club:'WEDGE',loft:'48'},{club:'WEDGE',loft:'50'},{club:'WEDGE',loft:'52'},
            {club:'WEDGE',loft:'54'},{club:'WEDGE',loft:'56'},{club:'WEDGE',loft:'58'},{club:'WEDGE',loft:'60'}
        ];

        function initClubData() {
            clubData = CLUBS.map((c,i) => ({
                id: i,
                club: c.club,
                loft: c.loft,
                len: 0,
                max: 0,
                leftShots: [],
                rightShots: []
            }));
        }

        initClubData();

        (async function init() {
            const {data: {session}} = await sb.auth.getSession();
            if (session) {
                currentUser = session.user;
                await showApp();
            } else {
                showAuth();
            }
        })();

        function showAuth() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('app-screen').style.display = 'none';
        }

        async function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'flex';
            document.getElementById('user-email-display').textContent = currentUser.email;
            await loadData();
            renderTable();
            renderOverview();
        }

        function switchTab(mode) {
            authMode = mode;
            const loginBtn = document.getElementById('btn-login');
            const signupBtn = document.getElementById('btn-signup');
            const submitBtn = document.getElementById('auth-submit');
            
            if (mode === 'login') {
                loginBtn.classList.add('active');
                signupBtn.classList.remove('active');
                submitBtn.textContent = 'LOGIN';
            } else {
                signupBtn.classList.add('active');
                loginBtn.classList.remove('active');
                submitBtn.textContent = 'SIGN UP';
            }
            document.getElementById('auth-msg').className = 'auth-msg';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            
            let result;
            if (authMode === 'login') {
                result = await sb.auth.signInWithPassword({email, password});
            } else {
                result = await sb.auth.signUp({email, password});
            }
            
            if (result.error) {
                showMsg(result.error.message, 'error');
            } else {
                currentUser = result.data.user;
                if (authMode === 'signup') {
                    showMsg('Account created successfully!', 'success');
                }
                await showApp();
            }
        }

        function showMsg(text, type) {
            const el = document.getElementById('auth-msg');
            el.textContent = text;
            el.className = 'auth-msg ' + type;
        }

        async function signOut() {
            await sb.auth.signOut();
            currentUser = null;
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
            document.getElementById('auth-msg').className = 'auth-msg';
            showAuth();
        }

        async function deleteAccount() {
            if (!confirm('Delete your account and all data? This cannot be undone.')) return;
            try {
                await sb.from('club_data').delete().eq('user_id', currentUser.id);
                await sb.auth.signOut();
                alert('Account deleted successfully');
                currentUser = null;
                showAuth();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function setUnit(u) {
            unit = u;
            document.getElementById('btn-m').classList.toggle('active', u === 'm');
            document.getElementById('btn-yds').classList.toggle('active', u === 'yds');
            renderTable();
            renderOverview();
        }

        function conv(val) {
            return unit === 'yds' ? Math.round(val * 1.09361) : Math.round(val);
        }

        async function loadData() {
            const {data} = await sb.from('club_data').select('*').eq('user_id', currentUser.id).single();
            if (data && data.data) {
                try {
                    const loaded = JSON.parse(data.data);
                    clubData = clubData.map((row, i) => ({...row, ...(loaded[i] || {})}));
                } catch (e) {
                    console.error('Parse error:', e);
                }
            }
        }

        async function saveData() {
            const payload = {user_id: currentUser.id, data: JSON.stringify(clubData)};
            const {error} = await sb.from('club_data').upsert(payload, {onConflict: 'user_id'});
            showToast(error ? 'Error saving' : 'Saved!');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function renderTable() {
            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            
            clubData.forEach((row, i) => {
                const tr = document.createElement('tr');
                const loftSelect = row.club === 'WEDGE' 
                    ? `<select onchange="updateLoft(${i}, this.value)">
                        ${['48','50','52','54','56','58','60'].map(l => 
                            `<option value="${l}" ${row.loft===l?'selected':''}>${l}°</option>`
                        ).join('')}
                       </select>`
                    : (row.loft ? `${row.loft}°` : '');
                
                const stats = getStats(row);
                const dispHtml = renderDispersionBar(stats);
                
                tr.innerHTML = `
                    <td><b>${row.club}</b> ${row.club === 'WEDGE' ? loftSelect : (row.loft ? `(${row.loft}°)` : '')}</td>
                    <td><input type="number" value="${row.len||''}" onchange="updateVal(${i},'len',this.value)" style="width:70px"></td>
                    <td><input type="number" value="${row.max||''}" onchange="updateVal(${i},'max',this.value)" style="width:70px"></td>
                    <td><input type="number" placeholder="0" onkeypress="if(event.key==='Enter'){addShot(${i},'left',this.value);this.value='';}" style="width:60px"></td>
                    <td><input type="number" placeholder="0" onkeypress="if(event.key==='Enter'){addShot(${i},'right',this.value);this.value='';}" style="width:60px"></td>
                    <td>${dispHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateLoft(i, val) {
            clubData[i].loft = val;
            renderTable();
        }

        function updateVal(i, field, val) {
            clubData[i][field] = parseFloat(val) || 0;
        }

        function addShot(i, dir, val) {
            const num = parseFloat(val);
            if (isNaN(num) || num < 0) return;
            clubData[i][dir === 'left' ? 'leftShots' : 'rightShots'].push(num);
            renderTable();
            renderOverview();
        }

        function getStats(row) {
            const leftShots = row.leftShots || [];
            const rightShots = row.rightShots || [];
            const leftMax = leftShots.length > 0 ? Math.max(...leftShots) : 0;
            const rightMax = rightShots.length > 0 ? Math.max(...rightShots) : 0;
            const leftAvg = leftShots.length > 0 ? Math.round(leftShots.reduce((a,b)=>a+b,0) / leftShots.length) : 0;
            const rightAvg = rightShots.length > 0 ? Math.round(rightShots.reduce((a,b)=>a+b,0) / rightShots.length) : 0;
            const totalShots = leftShots.length + rightShots.length;
            const leftPct = totalShots > 0 ? Math.round((leftShots.length / totalShots) * 100) : 0;
            const rightPct = 100 - leftPct;
            return {leftMax, rightMax, leftAvg, rightAvg, leftCount: leftShots.length, rightCount: rightShots.length, totalShots, leftPct, rightPct};
        }

        function renderDispersionBar(stats) {
            if (stats.totalShots === 0) return '<span style="color:#999;font-size:12px">No data</span>';
            
            const maxVal = Math.max(stats.leftMax, stats.rightMax) || 1;
            const leftMaxPct = (stats.leftMax / maxVal) * 50;
            const rightMaxPct = (stats.rightMax / maxVal) * 50;
            const leftAvgPct = (stats.leftAvg / maxVal) * 50;
            const rightAvgPct = (stats.rightAvg / maxVal) * 50;
            
            const diff = Math.abs(stats.leftPct - stats.rightPct);
            let biasColor = '#4CAF50';
            if (diff >= 35) biasColor = '#f44336';
            else if (diff >= 12) biasColor = '#FF9800';
            
            let biasLabel = 'STRAIGHT';
            if (stats.leftPct > stats.rightPct + 5) biasLabel = 'BIAS L';
            if (stats.rightPct > stats.leftPct + 5) biasLabel = 'BIAS R';
            
            return `
                <div class="disp-container">
                    <div class="disp-bar">
                        <div class="disp-max-l" style="background:#90EE90;right:50%;width:${leftMaxPct}%"></div>
                        <div class="disp-max-r" style="background:#90EE90;left:50%;width:${rightMaxPct}%"></div>
                        <div class="disp-avg-l" style="background:#228B22;right:50%;width:${leftAvgPct}%"></div>
                        <div class="disp-avg-r" style="background:#228B22;left:50%;width:${rightAvgPct}%"></div>
                        <div class="disp-label" style="color:${biasColor}">
                            ${conv(stats.leftAvg)}${unit} ← ${biasLabel} → ${conv(stats.rightAvg)}${unit}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderOverview() {
            const container = document.getElementById('overview-graph');
            const withData = clubData.filter(r => (r.leftShots?.length || 0) + (r.rightShots?.length || 0) > 0);
            
            if (withData.length === 0) {
                container.innerHTML = '<p style="color:#999;text-align:center;padding:20px">No shot data yet. Add dispersion shots to see the overview.</p>';
                return;
            }
            
            container.innerHTML = withData.map(row => {
                const label = row.club + (row.loft ? ` (${row.loft}°)` : '');
                const stats = getStats(row);
                const dispHtml = renderDispersionBar(stats);
                return `
                    <div style="margin-bottom:16px">
                        <div style="font-weight:700;margin-bottom:6px;font-size:14px;color:#1a5c28">${label}</div>
                        ${dispHtml}
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
