// ── STATS CALCULATION ──
function getStats(row) {
  const leftShots = row.leftShots || [];
  const rightShots = row.rightShots || [];
  
  const leftMax = leftShots.length > 0 ? Math.max(...leftShots) : 0;
  const rightMax = rightShots.length > 0 ? Math.max(...rightShots) : 0;
  
  const leftAvg = leftShots.length > 0
    ? Math.round(leftShots.reduce((a,b)=>a+b,0) / leftShots.length)
    : 0;
  const rightAvg = rightShots.length > 0
    ? Math.round(rightShots.reduce((a,b)=>a+b,0) / rightShots.length)
    : 0;
  
  const totalShots = leftShots.length + rightShots.length;
  const leftPct = totalShots > 0
    ? Math.round((leftShots.length / totalShots) * 100)
    : 0;
  const rightPct = totalShots > 0
    ? Math.round((rightShots.length / totalShots) * 100)
    : 0;
  
  return {
    leftMax, rightMax,
    leftAvg, rightAvg,
    leftCount: leftShots.length,
    rightCount: rightShots.length,
    totalShots,
    leftPct, rightPct,
  };
}

// ── SUPABASE DATA ──
async function loadData() {
  if (!currentUser) return;
  const { data, error } = await sb
    .from('club_data')
    .select('rows_json, unit')
    .eq('user_id', currentUser.id)
    .maybeSingle();

  if (!error && data) {
    try {
      const parsed = JSON.parse(data.rows_json);
      if (Array.isArray(parsed) && parsed.length === 16) {
        rows = parsed.map(r => ({
          ...r,
          leftShots: r.leftShots || [],
          rightShots: r.rightShots || [],
        }));
      }
    } catch(e) {}
    if (data.unit === 'm' || data.unit === 'yds') unit = data.unit;
  }
}

async function saveData() {

    .from('club_data')
    .upsert({

      rows_json: JSON.stringify(rows),
      unit:      unit,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id' });

// ── UPDATE ROW ──
function updateRow(i, field, val) {
  if (field === 'leftShot') {
    if (val > 0) rows[i].leftShots.push(val);
  } else if (field === 'rightShot') {
    if (val > 0) rows[i].rightShots.push(val);
  } else {
    rows[i][field] = val;
  }
  renderRow(i);
  renderOverview();
}

function render() {
  renderTable();
  renderOverview();
}

function renderTable() {
  const body = document.getElementById('table-body');
  body.innerHTML = '';

  rows.forEach((row, i) => {
    const isWedge = row.isWedge;
    const isEven  = i % 2 === 0;
    const rowBg   = isWedge
      ? (isEven ? 'var(--wedge-bg)' : 'var(--wedge-alt)')
      : (isEven ? 'var(--card-bg)'  : 'var(--row-alt)');
    const borderLeft = isWedge ? '3px solid var(--amber-border)' : '3px solid transparent';

    const div = document.createElement('div');
    div.className = 'table-row' + (isWedge ? ' wedge-row' : '');
    div.style.background  = rowBg;
    div.style.borderLeft  = borderLeft;
    div.dataset.rowIndex  = i;
    div.dataset.rowBg     = rowBg;
    div.id = `row-${i}`;

    // Row number
    const numEl = document.createElement('div');
    numEl.className = 'row-num' + (isWedge ? ' wedge' : '');
    numEl.textContent = String(i+1).padStart(2,'0');
    div.appendChild(numEl);

    // Club / Wedge selector
    const sel = document.createElement('select');
    sel.className = 'cell-select' + (isWedge ? ' wedge-select' : '');
    if (isWedge) {
      WEDGE_DEGREES.forEach(d => {
        const o = document.createElement('option');
        o.value = d; o.textContent = d + ' Wedge';
        if (d === row.wedgeDeg) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', e => updateRow(i, 'wedgeDeg', e.target.value));
    } else {
      STANDARD_CLUBS.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        if (c === row.club) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', e => updateRow(i, 'club', e.target.value));
    }
    div.appendChild(sel);

    // Len, Max
    ['len','max'].forEach(field => {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.className = 'cell-input';
      inp.min = 0;
      inp.placeholder = field === 'len' ? 'Carry' : 'Max';
      inp.value = row[field] || '';
      inp.addEventListener('blur', e => {
        const v = parseInt(e.target.value, 10);
        updateRow(i, field, isNaN(v) ? 0 : Math.max(0, v));
      });
      div.appendChild(inp);
    });

    // Left, Right
    ['left','right'].forEach(side => {
      const inp = document.createElement('input');
      inp.type = 'number';
      inp.className = 'cell-input';
      inp.min = 0;
      inp.placeholder = side.toUpperCase();
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          const v = parseInt(e.target.value, 10);
          if (!isNaN(v) && v > 0) {
            updateRow(i, side + 'Shot', v);
            e.target.value = '';
          }
        }
      });
      div.appendChild(inp);
    });

    // Dispersion bar
    const spreadWrap = document.createElement('div');
    spreadWrap.id = `spread-${i}`;
    div.appendChild(spreadWrap);

    body.appendChild(div);
    renderRow(i);
  });
}

    return;

  const maxSpread = Math.max(stats.leftMax, stats.rightMax, 1);

  const leftAvgPct  = (stats.leftAvg  / maxSpread) * 100;
  const rightAvgPct = (stats.rightAvg / maxSpread) * 100;

  const bias = (stats.rightCount - stats.leftCount) / stats.totalShots;
  const biasColor = Math.abs(bias) < 0.12 ? 'var(--green)'

  const rightMaxLabel = stats.rightMax > 0 ? `${stats.rightMax}${unit}` : '';
  const rightAvgLabel = stats.rightAvg > 0 ? `${stats.rightAvg}${unit}` : '';

  el.innerHTML = `

      <div class="spread-track" style="position:relative;margin-bottom:4px">
        <div class="spread-half left">

        <div class="spread-half right">
          <div class="spread-layer max" style="left:0;width:${rightMaxPct}%;background:rgba(30,58,138,0.4);display:flex;align-items:center;justify-content:flex-end;padding-right:2px">

          </div>

        <span style="font-size:8px;font-weight:700;color:var(--red)">${stats.leftCount} ←</span>
        <span style="font-size:9px;font-weight:800;font-family:var(--font-display);color:${biasColor};letter-spacing:0.06em">${stats.leftPct}% ← ${biasLabel} → ${stats.rightPct}%</span>
        <span style="font-size:8px;font-weight:700;color:var(--blue)">→ ${stats.rightCount}</span>
      </div>
    </div>`;
}

function renderOverview() {

  const clubsWithData = rows
    .map((r,i) => ({...r, index:i}))
    .filter(r => (r.club !== '—' || r.isWedge) && (r.leftShots.length > 0 || r.rightShots.length > 0));

  if (clubsWithData.length === 0) {
    body.innerHTML = '<div style="text-align:center;color:var(--text-light);font-size:11px;padding:20px">No data yet — start tracking shots!</div>';

    ...clubsWithData.flatMap(r => {
      const s = getStats(r);
      return [s.leftMax, s.rightMax];

    1
  );

    const stats = getStats(r);
    const label = r.isWedge ? `${r.wedgeDeg} Wedge` : r.club;
    
    const leftMaxPct = (stats.leftMax / globalMax) * 100;

    const leftAvgPct = (stats.leftAvg / globalMax) * 100;
    const rightAvgPct = (stats.rightAvg / globalMax) * 100;

    const bias = (stats.rightCount - stats.leftCount) / stats.totalShots;
    const biasColor = Math.abs(bias) < 0.12 ? 'var(--green)'
                    : Math.abs(bias) < 0.35  ? '#b45309'
                    : 'var(--red)';

    const leftMaxLabel = stats.leftMax > 0 ? `${stats.leftMax}${unit}` : '';
    const leftAvgLabel = stats.leftAvg > 0 ? `${stats.leftAvg}${unit}` : '';
    const rightMaxLabel = stats.rightMax > 0 ? `${stats.rightMax}${unit}` : '';
    const rightAvgLabel = stats.rightAvg > 0 ? `${stats.rightAvg}${unit}` : '';

    body.innerHTML += `

        <div class="ov-label${r.isWedge?' wedge':''}">${label}</div>
        <div class="ov-bar-wrap">
          <div class="ov-half left">
